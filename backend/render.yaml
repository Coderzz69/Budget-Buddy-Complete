services:
  - type: web
    name: budget-buddy-backend
    env: docker
    region: ohio
    plan: free
    healthCheckPath: /api/health/
    envVars:
      - key: DATABASE_URL
        sync: false # Set in Render dashboard
      - key: CLERK_SECRET_KEY
        sync: false # Set in Render dashboard
      - key: CLERK_ISSUER_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:8081"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
